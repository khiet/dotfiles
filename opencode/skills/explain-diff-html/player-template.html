<!--
  Canonical audio-player widget + page theme for the explain-diff-html skill.
  Copy the three parts below verbatim into the generated page. The only edit you
  make is filling the <audio src> with the base64 data: URI in part 2.

  To retheme the whole page, edit only the :root block in part 1 - every element
  (headings, links, diagrams, code blocks, and this player) reads from it.
-->

<!--
  PART 1 - THEME + PLAYER STYLES. Paste into the page <style>.
  The :root block is the page-wide Dracula Classic (dark) palette used by every
  element, not just the player. Use these variables throughout; do not hardcode
  ad hoc colors elsewhere.
-->
<style>
:root {
  --background: #282A36;
  --current-line: #44475A;
  --selection: #44475A;
  --foreground: #F8F8F2;
  --comment: #6272A4;
  --red: #FF5555;
  --orange: #FFB86C;
  --yellow: #F1FA8C;
  --green: #50FA7B;
  --cyan: #8BE9FD;
  --purple: #BD93F9;
  --pink: #FF79C6;
}
.player {
  background: var(--current-line);
  border: 1px solid var(--comment);
  border-radius: 12px;
  padding: 16px;
  margin: 24px 0;
  max-width: 640px;
}
.player-top { display: flex; align-items: center; gap: 14px; }
.play-btn {
  flex: 0 0 auto;
  width: 48px; height: 48px;
  border-radius: 50%;
  border: none;
  background: var(--purple);
  color: var(--background);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.player-title { font-weight: 600; color: var(--foreground); }
.player-controls-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
.time { font-variant-numeric: tabular-nums; color: var(--comment); font-size: 13px; min-width: 40px; }
.time#durTime { text-align: right; }
.seek-wrap { flex: 1; cursor: pointer; padding: 6px 0; }
.seek-track { height: 4px; background: var(--selection); border-radius: 2px; overflow: hidden; }
.seek-fill { height: 100%; width: 0%; background: var(--green); }
.icon-btn, .speed-btn {
  background: transparent;
  border: 1px solid var(--comment);
  color: var(--foreground);
  border-radius: 6px;
  padding: 4px 10px;
  cursor: pointer;
  font-size: 13px;
}
.icon-btn:hover, .speed-btn:hover { border-color: var(--cyan); }
.speed-group { display: flex; gap: 6px; margin-left: auto; }
.speed-btn.active { background: var(--purple); color: var(--background); border-color: var(--purple); }
.player button:focus-visible, .seek-wrap:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }
</style>

<!--
  PART 2 - PLAYER MARKUP. Paste near the top of the page body.
  Fill in only the <audio src> with the base64 data: URI.
-->
<div class="player" id="player">
  <div class="player-top">
    <button class="play-btn" id="playBtn" aria-label="Play">&#9654;</button>
    <div class="player-meta">
      <div class="player-title">Listen to this explanation</div>
    </div>
  </div>
  <div class="player-controls-row">
    <span class="time" id="curTime">0:00</span>
    <div class="seek-wrap" id="seekWrap" tabindex="0" role="slider" aria-label="Seek"
         aria-valuemin="0" aria-valuenow="0">
      <div class="seek-track"><div class="seek-fill" id="seekFill"></div></div>
    </div>
    <span class="time" id="durTime">0:00</span>
  </div>
  <div class="player-controls-row">
    <button class="icon-btn" id="backBtn" aria-label="Back 5 seconds">&#8634; 5s</button>
    <button class="icon-btn" id="fwdBtn" aria-label="Forward 5 seconds">5s &#8635;</button>
    <div class="speed-group">
      <button class="speed-btn active" data-speed="1" id="speed1">1x</button>
      <button class="speed-btn" data-speed="1.5" id="speed15">1.5x</button>
      <button class="speed-btn" data-speed="2" id="speed2">2x</button>
    </div>
  </div>
  <audio id="audio" preload="metadata" src="data:audio/mp4;base64,REPLACE_WITH_BASE64"></audio>
</div>

<!--
  PART 3 - PLAYER SCRIPT. Paste before </body>. Drives the single <audio>
  element; keyboard-accessible.
-->
<script>
(function () {
  const player = document.getElementById('player');
  if (!player) return;
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const seekWrap = document.getElementById('seekWrap');
  const seekFill = document.getElementById('seekFill');
  const curTime = document.getElementById('curTime');
  const durTime = document.getElementById('durTime');
  const backBtn = document.getElementById('backBtn');
  const fwdBtn = document.getElementById('fwdBtn');

  const fmt = (s) => {
    if (!isFinite(s)) return '0:00';
    s = Math.max(0, Math.floor(s));
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  };
  const setIcon = () => {
    playBtn.textContent = audio.paused ? '▶' : '❚❚';
    playBtn.setAttribute('aria-label', audio.paused ? 'Play' : 'Pause');
  };
  const skip = (delta) => {
    audio.currentTime = Math.min(audio.duration || 0, Math.max(0, audio.currentTime + delta));
  };

  playBtn.addEventListener('click', () => { audio.paused ? audio.play() : audio.pause(); });
  audio.addEventListener('play', setIcon);
  audio.addEventListener('pause', setIcon);
  audio.addEventListener('loadedmetadata', () => { durTime.textContent = fmt(audio.duration); });
  audio.addEventListener('timeupdate', () => {
    curTime.textContent = fmt(audio.currentTime);
    const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
    seekFill.style.width = pct + '%';
    seekWrap.setAttribute('aria-valuenow', Math.floor(audio.currentTime));
  });

  const seekTo = (clientX) => {
    const rect = seekWrap.getBoundingClientRect();
    const ratio = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
    if (audio.duration) audio.currentTime = ratio * audio.duration;
  };
  seekWrap.addEventListener('click', (e) => seekTo(e.clientX));
  seekWrap.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') { skip(5); e.preventDefault(); }
    if (e.key === 'ArrowLeft') { skip(-5); e.preventDefault(); }
  });

  backBtn.addEventListener('click', () => skip(-5));
  fwdBtn.addEventListener('click', () => skip(5));

  player.querySelectorAll('.speed-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
      audio.playbackRate = parseFloat(btn.dataset.speed);
      player.querySelectorAll('.speed-btn').forEach((b) => b.classList.toggle('active', b === btn));
    });
  });
})();
</script>
